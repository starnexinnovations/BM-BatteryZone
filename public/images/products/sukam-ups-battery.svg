<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- Battery body -->
  <rect x="90" y="130" width="220" height="220" rx="10" fill="url(#body)" filter="url(#shadow)"/>
  <!-- Battery top lid -->
  <rect x="85" y="115" width="230" height="30" rx="6" fill="url(#top)"/>
  <!-- Terminals -->
  <rect x="130" y="100" width="18" height="20" rx="3" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <rect x="252" y="100" width="18" height="20" rx="3" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <!-- Label area -->
  <rect x="110" y="170" width="180" height="150" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Brand text -->
  <text x="200" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="26" fill="white">SU-KAM</text>
  <!-- Subtitle -->
  <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Falcon+</text>
  <!-- Specs -->
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="white">12V 42Ah</text>
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">VRLA • INDUSTRIAL GRADE</text>
</svg>
